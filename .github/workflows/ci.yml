name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.0

      - name: Install dependencies
        working-directory: goingtodoit_app
        run: flutter pub get

      - name: Analyze
        working-directory: goingtodoit_app
        run: flutter analyze

  android:
    name: Android Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.0

      - name: Install dependencies
        working-directory: goingtodoit_app
        run: flutter pub get

      - name: Build APK (debug)
        working-directory: goingtodoit_app
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: goingtodoit_app/build/app/outputs/apk/debug/app-debug.apk
          retention-days: 14

  ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.0

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer

      - name: Install dependencies
        working-directory: goingtodoit_app
        run: flutter pub get

      - name: Build iOS (no codesign)
        working-directory: goingtodoit_app
        run: flutter build ios --no-codesign --debug

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-build
          path: goingtodoit_app/build/ios/iphoneos/Runner.app
          retention-days: 14
